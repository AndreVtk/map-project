<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Wro Traffic v11 - AutoGeo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: sans-serif; overflow: hidden; background: #f0f0f0; }
    #map { height: 100vh; width: 100vw; }
    .menu-toggle {
      position: absolute; bottom: 25px; right: 25px; z-index: 1000;
      width: 44px; height: 44px; background: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 20px;
    }
    .mobile-menu {
      position: absolute; bottom: 85px; right: 25px; z-index: 1000;
      background: white; width: 220px; border-radius: 12px;
      display: none; padding: 15px; flex-direction: column; gap: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .mobile-menu.active { display: flex; }
    .status-mini { font-size: 11px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .btn { background: #eee; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-scan { background: #28C76F; color: white; margin-top: 5px; }
    .btn-geo { background: #007AFF; color: white; }
    .live-indicator {
      position: absolute; top: 15px; left: 15px; z-index: 1000;
      font-size: 10px; background: white; padding: 4px 10px; border-radius: 20px;
      display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .dot { width: 7px; height: 7px; background: #999; border-radius: 50%; }
    .dot.active { background: #28C76F; box-shadow: 0 0 5px #28C76F; }
  </style>
</head>
<body>

<div class="live-indicator"><div class="dot" id="liveDot"></div> <span id="sys-text">READY</span></div>
<div class="menu-toggle" onclick="tglM()">⚙️</div>

<div class="mobile-menu" id="mM">
  <div class="status-mini">
    🌤 Погода: <b id="s-w">...</b><br>
    🚗 Трафик: <b id="s-t">Ждет обновления</b><br>
    🧊 Сетка: <b id="s-h">...</b>
  </div>
  <button class="btn btn-scan" id="scanBtn" onclick="runScan()">🔄 ОБНОВИТЬ ПРОБКИ</button>
  <button class="btn btn-geo" onclick="find()">📍 Центр на мне</button>
  <button class="btn" onclick="tglT()">🌓 Тема</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js"></script>

<script>
const KEY = "CrVdJV7ZUJKF6mKpf9M9kF1YJ5qdxxBv";
// Начальный вид — центр Вроцлава, пока не подтянулось Гео
const map = L.map('map', {zoomControl:false, attributionControl:false}).setView([51.1079, 17.0385], 13);

const lT = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
const dT = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

let isD = false, rain = 1.0, trafficMap = {}, polys = {}, isScanning = false;
const hL = L.layerGroup().addTo(map);

// Маркер пользователя
const uM = L.circleMarker([0,0], {radius:7, color:'#fff', fillColor:'#007AFF', fillOpacity:1, weight:2}).addTo(map);

// Функции меню
function tglM() { document.getElementById('mM').classList.toggle('active'); }
function tglT() { isD ? (map.removeLayer(dT), lT.addTo(map)) : (map.removeLayer(lT), dT.addTo(map)); isD=!isD; tglM(); }

// Логика ГЕОПОЗИЦИИ
function find() { 
  map.locate({setView: true, maxZoom: 15, enableHighAccuracy: true}); 
}

map.on('locationfound', e => {
  uM.setLatLng(e.latlng);
  console.log("Локация определена автоматически");
});

map.on('locationerror', () => {
  console.log("Геопозиция недоступна. Проверьте разрешения браузера.");
});

// АВТО-ЗАПУСК ГЕО ПРИ ЗАГРУЗКЕ
window.onload = () => {
  find(); 
};

// Сетка (Leśnica - Swojczyce / Polanowice - Radomierzyce)
const bounds = [[51.16, 16.88], [51.16, 17.15], [51.03, 17.15], [51.03, 16.88]];
const hexes = h3.polyfill(bounds, 9);
document.getElementById('s-h').innerText = hexes.length + " сот";

// Погода
async function getW() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.1&longitude=17.0&current_weather=true');
    const d = await r.json();
    rain = (d.current_weather.weathercode >= 51) ? 1.4 : 1.0;
    document.getElementById('s-w').innerText = (rain > 1) ? "Осадки (x1.4)" : "Ясно";
  } catch(e) { document.getElementById('s-w').innerText = "Ошибка"; }
}
getW();

const sleep = ms => new Promise(res => setTimeout(res, ms));

async function runScan() {
  if(isScanning) return;
  isScanning = true;
  document.getElementById('scanBtn').innerText = "СКАН... ⏳";
  document.getElementById('scanBtn').style.background = "#999";
  document.getElementById('liveDot').classList.add('active');
  document.getElementById('sys-text').innerText = "SCANNING...";

  let count = 0;
  for (let h of hexes) {
    const [lat, lng] = h3.h3ToGeo(h);
    try {
      const r = await fetch(`https://api.tomtom.com/traffic/services/4/flowSegmentData/absolute/10/json?key=${KEY}&point=${lat},${lng}`);
      if(r.status === 403) throw "403 Limit";
      const d = await r.json();
      if(d.flowSegmentData) {
        const {freeFlowSpeed: f, currentSpeed: c} = d.flowSegmentData;
        trafficMap[h] = c > (f * 0.95) ? 1.0 : (f / c);
      }
    } catch(e) { 
      document.getElementById('s-t').innerText = "Ошибка: " + e;
      if(e === "403 Limit") break; 
    }
    count++;
    if(count % 5 === 0) {
        document.getElementById('s-t').innerText = `Прогресс: ${count}/${hexes.length}`;
        upd();
    }
    await sleep(150); // Чуть ускорил паузу до 150мс
  }

  isScanning = false;
  document.getElementById('scanBtn').innerText = "🔄 ОБНОВИТЬ ПРОБКИ";
  document.getElementById('scanBtn').style.background = "#28C76F";
  document.getElementById('liveDot').classList.remove('active');
  document.getElementById('sys-text').innerText = "IDLE";
  document.getElementById('s-t').innerText = "Готово: " + new Date().toLocaleTimeString();
  tglM();
}

function upd() {
  hexes.forEach(h => {
    if (!trafficMap[h]) return;
    let d = (trafficMap[h] || 1.0) * rain;
    let clr = d > 1.7 ? "#FF3B30" : (d > 1.3 ? "#FFCC00" : null);
    if(!clr) { if(polys[h]) { hL.removeLayer(polys[h]); delete polys[h]; } return; }
    if(polys[h]) polys[h].setStyle({fillColor:clr, color:clr});
    else polys[h] = L.polygon(h3.h3ToGeoBoundary(h), {fillColor:clr, color:clr, weight:0.4, fillOpacity:0.45, interactive:false}).addTo(hL);
  });
}
</script>
</body>
</html>
